version: '3.8'

services:
  app:
    build: .
    container_name: rspamd_learning
    ports:
      - "8000:8000"
    volumes:
      - ./data/emails:/app/data/emails
      - ./data/db:/app/data/db
    environment:
      - DEBUG=False
      - SECRET_KEY=your-secret-key-change-in-production
      - DATABASE_URL=sqlite:////app/data/db/rspamd_learning.db
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=password123
      - MAIL_SOURCE_TYPE=local_eml
      - MAIL_SOURCE_PATH=/app/data/emails
      - RSPAMD_ENABLED=False
      - RSPAMD_HOST=rspamd
      - RSPAMD_PORT=11333
    restart: unless-stopped
    depends_on:
      - rspamd

  rspamd:
    image: vsevolod/rspamd:latest
    container_name: rspamd_service
    ports:
      - "11333:11333"
      - "11334:11334"
    volumes:
      - ./rspamd-data:/var/lib/rspamd
    restart: unless-stopped
    networks:
      - default
