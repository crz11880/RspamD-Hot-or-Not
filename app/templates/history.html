<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title data-i18n="history_title">History - RspamdHotOrNot</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="app-container">
        <nav class="sidebar">
            <div class="sidebar-header">
                <h2>RspamdHotOrNot</h2>
            </div>
            
            <ul class="nav-menu">
                <li><a href="/dashboard">Dashboard</a></li>
                <li><a href="/review" data-i18n="nav_review">Review</a></li>
                <li><a href="/history" class="active" data-i18n="nav_history">History</a></li>
                <li><a href="/settings" data-i18n="nav_settings">Settings</a></li>
                <li class="divider"></li>
                <li><a href="#" onclick="logout()" class="logout" data-i18n="nav_logout">Logout</a></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-bar">
                <h1 data-i18n="history_title">Classification history</h1>
                <div class="user-info">
                    <span id="username"></span>
                </div>
            </header>

            <div class="content">
                <div class="history-controls">
                    <input type="text" id="searchInput" placeholder="Search..." class="search-input" data-i18n-placeholder="search_placeholder">
                </div>

                <div class="history-table">
                    <table>
                        <thead>
                            <tr>
                                <th data-i18n="col_datetime">Date/Time</th>
                                <th data-i18n="col_sender">Sender</th>
                                <th data-i18n="col_subject">Subject</th>
                                <th data-i18n="col_decision">Decision</th>
                                <th data-i18n="col_rspamd">Rspamd</th>
                            </tr>
                        </thead>
                        <tbody id="historyTableBody">
                            <tr><td colspan="5" class="loading" data-i18n="loading">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
        async function loadHistory() {
            try {
                const response = await fetch('/api/messages/history/list?limit=200', {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });
                
                const history = await response.json();
                const tbody = document.getElementById('historyTableBody');
                
                if (history.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5">${t('no_history')}</td></tr>`;
                    return;
                }
                
                tbody.innerHTML = history.map(item => `
                    <tr>
                        <td>${formatDateLocalized(item.created_at)}</td>
                        <td>${escapeHtml(item.sender || '-')}</td>
                        <td>${escapeHtml(item.subject || '-')}</td>
                        <td><span class="decision-badge ${item.decision}">${getDe(item.decision)}</span></td>
                        <td><span class="rspamd-status ${item.rspamd_status}">${item.rspamd_status}</span></td>
                    </tr>
                `).join('');
            } catch (error) {
                console.error('Error loading history:', error);
                document.getElementById('historyTableBody').innerHTML = `<tr><td colspan="5">${t('load_history_error')}</td></tr>`;
            }
        }

        function getDe(decision) {
            const map = { spam: t('spam'), ham: t('decision_ham'), skipped: t('decision_skipped') };
            return map[decision] || decision;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        applyTranslations();
        document.getElementById('username').textContent = localStorage.getItem('username');
        loadHistory();

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            document.querySelectorAll('#historyTableBody tr').forEach(row => {
                const text = row.textContent.toLowerCase();
                row.style.display = text.includes(query) ? '' : 'none';
            });
        });
    </script>
</body>
</html>
